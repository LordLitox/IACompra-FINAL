# Nombre lógico del microservicio 
spring.application.name=orders-service
server.port=8085

# Configuración de conexión a la Base de Datos 
# Estructura: jdbc:mysql://HOSTNAME:PORT/DATABASE_NAME
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/orders_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago
spring.datasource.username=root
spring.datasource.password=!Funcionaweon09
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Estrategia de creación de tablas
# 'update' crea las tablas automáticamente basándose en tus @Entity 
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Mostrar SQL en consola para verificar que la persistencia funciona 
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.com.duoc.logihub=DEBUG